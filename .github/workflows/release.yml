name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        run: |
          python3 - <<'EOF'
          import os, tomllib
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          assert tag == version, f"tag v{tag} != pyproject version {version}"
          EOF
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Must match the "Environment name" configured for the PyPI trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/greymatter-mcp/
    permissions:
      # OIDC token used by PyPI trusted publishing — no API token/secret needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
